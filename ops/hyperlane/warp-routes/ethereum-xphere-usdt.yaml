# Hyperlane Warp Route template.
# USDT is non-standard on Ethereum; test approvals and transfers on a fork before public beta.
tokens:
  - chainName: ethereum
    type: collateral
    addressOrDenom: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
    name: Tether USD
    symbol: USDT
    decimals: 6
  - chainName: xphere
    type: synthetic
    name: Xphere Bridged USDT
    symbol: xUSDT
    decimals: 6
options:
  dailyLimitUsd: 25000
  totalTvlLimitUsd: 100000
  owner: "${PROTOCOL_ADMIN_SAFE}"
  interchainSecurityModule:
    type: multisig
    threshold: 2
    validators:
      - "${HYPERLANE_VALIDATOR_1}"
      - "${HYPERLANE_VALIDATOR_2}"
      - "${HYPERLANE_VALIDATOR_3}"
